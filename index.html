<!DOCTYPE html>
<html lang="en">
<head>
    <title>Service Booking App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2>Logo</h2>

    <div class="nav-links">
        <span>Home</span>
        <span>Services</span>
        <span>Contact Us</span>
        <span>About Us</span>
    </div>

    <div class="user">Username</div>
</div>

<div class="container">

    <div class="left">

        <h3>Added Items</h3>

        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Service Name</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="cartItems">
                <tr>
                    <td colspan="3" class="empty">No Items Added</td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            Total Amount: ₹ <span id="total">0</span>
        </div>

        <div class="form">
            <h3>Book Now</h3>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email ID">
            <input type="text" id="phone" placeholder="Phone Number">

            <button id="bookBtn" onclick="bookNow()" disabled>Book Now</button>

            <p id="msg"></p>
        </div>

    </div>

    <div class="right">
        <h3>Browse Our Services</h3>
        <p class="info">Click on add item to add services to cart or press skip</p>

        <div id="services"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
